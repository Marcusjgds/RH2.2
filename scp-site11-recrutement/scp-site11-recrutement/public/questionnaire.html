<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidature — SCP Site-11</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="q-shell">

<div class="q-header wood-band">
  <h2 id="qTitle">Chargement...</h2>
  <span class="q-progress" id="qProgress"></span>
</div>
<div class="hazard thin"></div>

<div class="q-container" id="qContainer"></div>

<div class="leave-warning" id="leaveWarning">
  <div class="box">
    <h3>Ne quitte pas cette page</h3>
    <p>Cette candidature doit etre completee sans quitter l'onglet, changer de fenetre ou sortir du plein ecran.
      Tentative detectee : <span class="count" id="leaveCount">1</span>.
      Ce comportement est enregistre et sera visible par l'equipe de recrutement.</p>
    <button class="btn btn-primary" id="resumeBtn">Revenir a la candidature</button>
  </div>
</div>

<script src="/js/questionnaire.js"></script>
</body>
</html>
